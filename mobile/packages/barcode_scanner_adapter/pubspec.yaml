name: barcode_scanner_adapter
description: Format-agnostic barcode scanner adapter for BAMUL ear tag scanning. Injectable abstraction over mobile_scanner. Barcode format injected at configuration time — not hardcoded.
version: 0.1.0
publish_to: none

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  mobile_scanner: ^5.2.3
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^6.0.0
  mocktail: ^1.0.4
