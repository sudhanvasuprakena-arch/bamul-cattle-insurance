name: capture_orchestrator
description: Camera capture pipeline for BAMUL cattle enrollment. Provides a Stream<CaptureResult> API with on-device TFLite quality gate, burst capture, and GPS embedding.
version: 0.1.0
publish_to: none

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  camera: ^0.11.0+2
  tflite_flutter: ^0.10.4
  geolocator: ^11.0.0
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^6.0.0
  mocktail: ^1.0.4
